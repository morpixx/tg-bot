# ── Bot service ──────────────────────────────────────────────────────────────
# Railway picks this file automatically for the "bot" service.
# In Railway UI: Settings → Config Path → railway.toml

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile"

[deploy]
# Wait for Postgres to accept connections, then migrate, then start the bot.
preDeployCommand = "python scripts/migrate.py"
startCommand = "python -m bot"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
# No TCP healthcheck — the bot is a long-running process, not a server.
# Railway marks the deploy healthy once the process stays alive past startup.
