# ── Worker service ────────────────────────────────────────────────────────────
# In Railway UI when adding the second service:
#   Settings → Config Path → railway.worker.toml

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile"

[deploy]
region = "europe-west4"
# Wait for the bot service to finish migrations before starting the worker.
# Alembic is idempotent (no-op when already at head) and uses a DB-level advisory
# lock, so running it from both services is safe.
preDeployCommand = "python scripts/migrate.py"
startCommand = "python -m worker"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
